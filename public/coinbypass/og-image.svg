<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0B05"/>
      <stop offset="100%" style="stop-color:#1A1408"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Background decorations -->
  <circle cx="150" cy="100" r="200" fill="url(#glow)"/>
  <circle cx="1050" cy="530" r="180" fill="url(#glow)"/>
  <!-- Grid lines -->
  <g opacity="0.1" stroke="#F59E0B" stroke-width="1">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>
  <!-- Coin Icon -->
  <g transform="translate(490, 165)">
    <circle cx="110" cy="110" r="110" fill="none" stroke="url(#gold)" stroke-width="8"/>
    <circle cx="110" cy="110" r="110" fill="#F59E0B" opacity="0.12"/>
    <circle cx="110" cy="110" r="82" fill="none" stroke="#FBBF24" stroke-width="3" opacity="0.5"/>
    <!-- Tether-style T glyph -->
    <g fill="#FBBF24">
      <rect x="60" y="58" width="100" height="22" rx="6"/>
      <rect x="98" y="68" width="24" height="100" rx="6"/>
      <ellipse cx="110" cy="118" rx="48" ry="18" fill="none" stroke="#FBBF24" stroke-width="9"/>
    </g>
  </g>
  <!-- Text -->
  <text x="100" y="120" font-size="72" font-weight="bold" fill="white" font-family="Arial">CoinBypass</text>
  <text x="100" y="550" font-size="34" fill="url(#gold)" font-family="Arial">USDT 충전 · 코인 결제 · 결제 우회</text>
  <!-- Feature badges -->
  <g transform="translate(100, 440)">
    <rect width="160" height="40" rx="20" fill="#F59E0B" opacity="0.2"/>
    <text x="80" y="27" font-size="18" fill="#FBBF24" font-family="Arial" text-anchor="middle">USDT 충전</text>
  </g>
  <g transform="translate(280, 440)">
    <rect width="160" height="40" rx="20" fill="#F59E0B" opacity="0.2"/>
    <text x="80" y="27" font-size="18" fill="#FBBF24" font-family="Arial" text-anchor="middle">코인 결제</text>
  </g>
  <g transform="translate(460, 440)">
    <rect width="160" height="40" rx="20" fill="#F59E0B" opacity="0.2"/>
    <text x="80" y="27" font-size="18" fill="#FBBF24" font-family="Arial" text-anchor="middle">결제 우회</text>
  </g>
</svg>
